<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videohovor pro neslyšící</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
  :root{
    --bg: #12181C;
    --surface: #1C252B;
    --surface-2: #232F36;
    --line: #2C3940;
    --text: #EDF2F4;
    --muted: #8CA0A8;
    --teal: #4FD1C5;
    --teal-dim: rgba(79,209,197,0.18);
    --amber: #F2A65A;
    --amber-dim: rgba(242,166,90,0.18);
    --danger: #E0654F;
    --radius: 18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }
  h1,h2,h3{
    font-family:'Space Grotesk','Inter',sans-serif;
    margin:0;
    letter-spacing:-0.01em;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 28px;
    border-bottom:1px solid var(--line);
    background:var(--surface);
  }
  header h1{font-size:20px; font-weight:600;}
  .status-dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--muted);
    display:inline-block;margin-right:8px;
    transition:background .3s;
  }
  .status-dot.on{background:var(--teal); box-shadow:0 0 0 4px var(--teal-dim);}
  .status-dot.off{background:var(--danger); box-shadow:0 0 0 4px rgba(224,101,79,0.18);}
  .status{font-size:13px; color:var(--muted); display:flex; align-items:center;}

  /* ---------- SETUP SCREEN ---------- */
  #setup{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:36px;
    width:100%;
    max-width:440px;
  }
  .card h2{font-size:24px; margin-bottom:6px;}
  .card p.sub{color:var(--muted); font-size:14px; margin:0 0 24px 0; line-height:1.5;}
  label{
    display:block; font-size:13px; color:var(--muted);
    margin-bottom:6px; margin-top:18px; font-weight:600;
    text-transform:uppercase; letter-spacing:.04em;
  }
  input[type=text]{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:13px 14px;
    color:var(--text);
    font-size:16px;
    font-family:inherit;
  }
  input[type=text]:focus{outline:2px solid var(--teal); border-color:var(--teal);}
  .id-box{
    background:var(--surface-2);
    border:1px dashed var(--line);
    border-radius:10px;
    padding:14px;
    margin-top:14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .id-box span{font-family:monospace; font-size:18px; letter-spacing:.06em; color:var(--teal);}
  .btn{
    border:none;
    border-radius:10px;
    padding:13px 20px;
    font-size:15px;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
    transition:transform .12s, filter .12s;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--teal); color:#08211F;}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-ghost{background:var(--surface-2); color:var(--text); border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--teal);}
  .btn-block{width:100%; margin-top:22px;}
  .btn-copy{background:var(--surface); color:var(--teal); border:1px solid var(--teal); font-size:13px; padding:8px 12px;}
  .divider{
    display:flex; align-items:center; gap:12px;
    color:var(--muted); font-size:12px; margin:26px 0;
    text-transform:uppercase; letter-spacing:.08em;
  }
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line);}
  #setup-error{color:var(--danger); font-size:13px; margin-top:10px; min-height:16px;}

  /* ---------- CALL SCREEN ---------- */
  #call{
    display:none;
    flex:1;
    flex-direction:row;
    min-height:0;
  }
  .stage{
    flex:1;
    position:relative;
    padding:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    min-width:0;
  }
  .remote-wrap{
    position:relative;
    width:100%;
    height:100%;
    border-radius:var(--radius);
    overflow:hidden;
    background:#0A0F12;
    border:1px solid var(--line);
  }
  video{
    width:100%; height:100%;
    object-fit:cover;
    background:#0A0F12;
    display:block;
  }
  .ring{
    position:absolute; inset:0;
    border-radius:var(--radius);
    pointer-events:none;
    box-shadow:0 0 0 0 var(--teal-dim);
    transition:box-shadow .25s ease;
  }
  .ring.active{box-shadow:0 0 0 6px var(--teal-dim);}
  .waiting-msg{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; color:var(--muted); text-align:center; padding:20px;
  }
  .pip{
    position:absolute;
    bottom:18px; right:18px;
    width:180px; aspect-ratio:4/3;
    border-radius:12px;
    overflow:hidden;
    border:2px solid var(--surface);
    box-shadow:0 4px 18px rgba(0,0,0,0.4);
    background:#0A0F12;
  }
  .name-tag{
    position:absolute; left:14px; bottom:12px;
    background:rgba(10,15,18,0.6);
    padding:5px 12px;
    border-radius:20px;
    font-size:13px;
    backdrop-filter:blur(4px);
  }
  .controls{
    position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
    display:flex; gap:12px;
    background:rgba(28,37,43,0.85);
    backdrop-filter:blur(10px);
    padding:12px; border-radius:50px;
    border:1px solid var(--line);
  }
  .ctrl-btn{
    width:52px; height:52px;
    border-radius:50%;
    border:none;
    background:var(--surface-2);
    color:var(--text);
    font-size:20px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background .15s, transform .12s;
  }
  .ctrl-btn:hover{background:#2A3941;}
  .ctrl-btn:active{transform:scale(0.92);}
  .ctrl-btn.off{background:var(--danger); color:#fff;}
  .ctrl-btn.hangup{background:var(--danger); color:#fff;}
  .ctrl-btn.hangup:hover{filter:brightness(1.1);}
  .ctrl-btn.chat-toggle.has-unread::after{
    content:""; position:absolute; width:10px; height:10px; border-radius:50%;
    background:var(--amber); top:2px; right:2px;
  }

  /* ---------- CHAT PANEL ---------- */
  #chat-panel{
    width:320px;
    flex-shrink:0;
    border-left:1px solid var(--line);
    background:var(--surface);
    display:flex;
    flex-direction:column;
    transition:width .2s;
  }
  #chat-panel.hidden{width:0; overflow:hidden; border-left:none;}
  .chat-head{
    padding:16px 18px;
    border-bottom:1px solid var(--line);
    font-weight:600;
    font-size:14px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .chat-head .typing{font-size:12px; color:var(--amber); font-weight:400;}
  #chat-log{
    flex:1;
    overflow-y:auto;
    padding:16px 18px;
    display:flex; flex-direction:column; gap:10px;
  }
  .msg{
    max-width:85%;
    padding:9px 13px;
    border-radius:14px;
    font-size:14px;
    line-height:1.4;
    word-wrap:break-word;
  }
  .msg.me{
    background:var(--teal-dim);
    color:var(--text);
    align-self:flex-end;
    border-bottom-right-radius:4px;
  }
  .msg.them{
    background:var(--surface-2);
    align-self:flex-start;
    border-bottom-left-radius:4px;
  }
  .msg.sys{
    align-self:center;
    color:var(--muted);
    font-size:12px;
    background:none;
    padding:2px;
  }
  .chat-input-row{
    display:flex; gap:8px;
    padding:14px;
    border-top:1px solid var(--line);
  }
  .chat-input-row input{
    flex:1;
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:20px;
    padding:10px 16px;
    color:var(--text);
    font-size:14px;
    font-family:inherit;
  }
  .chat-input-row input:focus{outline:none; border-color:var(--teal);}
  .send-btn{
    width:40px; height:40px;
    border-radius:50%;
    border:none;
    background:var(--teal);
    color:#08211F;
    font-size:16px;
    cursor:pointer;
    flex-shrink:0;
  }

  @media (max-width: 780px){
    #call{flex-direction:column;}
    #chat-panel{width:100%; height:0; border-left:none; border-top:1px solid var(--line);}
    #chat-panel.open{height:45vh;}
    .pip{width:110px;}
  }

  :focus-visible{outline:2px solid var(--teal); outline-offset:2px;}
</style>
</head>
<body>

<header>
  <h1>👋 Videohovor</h1>
  <div class="status" id="status-line"><span class="status-dot" id="status-dot"></span><span id="status-text">Odpojeno</span></div>
</header>

<!-- SETUP SCREEN -->
<div id="setup">
  <div class="card">
    <h2>Začít hovor</h2>
    <p class="sub">Funguje přímo v prohlížeči, propojení mezi vámi dvěma. Vlevo text, vpravo video — vhodné i pro odezírání a znakový jazyk.</p>

    <label for="my-name">Vaše jméno</label>
    <input type="text" id="my-name" placeholder="např. Jaroslav" autocomplete="off">

    <button class="btn btn-primary btn-block" id="create-room-btn">Vytvořit místnost</button>

    <div id="created-id-box" class="id-box" style="display:none;">
      <span id="my-id-display">—</span>
      <button class="btn btn-copy" id="copy-id-btn">Kopírovat kód</button>
    </div>

    <div class="divider">nebo</div>

    <label for="join-id">Kód místnosti od druhé osoby</label>
    <input type="text" id="join-id" placeholder="vložte kód">
    <button class="btn btn-ghost btn-block" id="join-room-btn">Připojit se</button>

    <div id="setup-error"></div>
  </div>
</div>

<!-- CALL SCREEN -->
<div id="call">
  <div class="stage">
    <div class="remote-wrap">
      <video id="remote-video" autoplay playsinline></video>
      <div class="ring" id="remote-ring"></div>
      <div class="waiting-msg" id="waiting-msg">
        <h3>Čeká se na připojení…</h3>
        <p>Pošlete druhé osobě kód místnosti.</p>
      </div>
      <div class="name-tag" id="remote-name-tag" style="display:none;"></div>
      <div class="pip">
        <video id="local-video" autoplay playsinline muted></video>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="mic-btn" title="Mikrofon">🎤</button>
        <button class="ctrl-btn" id="cam-btn" title="Kamera">📷</button>
        <button class="ctrl-btn chat-toggle" id="chat-toggle-btn" title="Chat">💬</button>
        <button class="ctrl-btn hangup" id="hangup-btn" title="Ukončit hovor">✕</button>
      </div>
    </div>
  </div>

  <div id="chat-panel">
    <div class="chat-head">
      <span>Textový chat</span>
      <span class="typing" id="typing-indicator"></span>
    </div>
    <div id="chat-log"></div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="Napište zprávu…">
      <button class="send-btn" id="send-btn">➤</button>
    </div>
  </div>
</div>

<script>
(function(){
  let peer = null;
  let call = null;
  let conn = null;
  let localStream = null;
  let myName = "";
  let remoteName = "";
  let typingTimeout = null;

  const setupEl = document.getElementById('setup');
  const callEl = document.getElementById('call');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const errorEl = document.getElementById('setup-error');

  function setStatus(state, text){
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = text;
  }

  function showError(msg){
    errorEl.textContent = msg;
  }

  // ---------- SETUP: create room ----------
  document.getElementById('create-room-btn').addEventListener('click', async () => {
    myName = document.getElementById('my-name').value.trim() || "Já";
    showError("");
    setStatus('', 'Vytváření místnosti…');
    try{
      await initPeer();
      document.getElementById('my-id-display').textContent = peer.id;
      document.getElementById('created-id-box').style.display = 'flex';
      setStatus('on', 'Místnost připravena — čeká se na druhou osobu');
    }catch(e){
      showError('Nepodařilo se vytvořit místnost. Zkontrolujte připojení k internetu.');
      setStatus('off', 'Chyba');
    }
  });

  document.getElementById('copy-id-btn').addEventListener('click', () => {
    navigator.clipboard.writeText(peer.id).then(()=>{
      const btn = document.getElementById('copy-id-btn');
      const old = btn.textContent;
      btn.textContent = 'Zkopírováno ✓';
      setTimeout(()=>btn.textContent = old, 1500);
    });
  });

  // ---------- SETUP: join room ----------
  document.getElementById('join-room-btn').addEventListener('click', async () => {
    myName = document.getElementById('my-name').value.trim() || "Já";
    const targetId = document.getElementById('join-id').value.trim();
    showError("");
    if(!targetId){ showError('Vložte prosím kód místnosti.'); return; }
    setStatus('', 'Připojování…');
    try{
      await initPeer();
      await startLocalMedia();
      connectToPeer(targetId);
    }catch(e){
      showError('Nepodařilo se připojit. Zkontrolujte kód a připojení k internetu.');
      setStatus('off', 'Chyba');
    }
  });

  function initPeer(){
    return new Promise((resolve, reject) => {
      peer = new Peer(undefined, { debug: 1 });
      peer.on('open', () => resolve());
      peer.on('error', (err) => { console.error(err); reject(err); });

      peer.on('call', async (incomingCall) => {
        await startLocalMedia();
        incomingCall.answer(localStream);
        setupCallEvents(incomingCall);
      });

      peer.on('connection', (c) => {
        conn = c;
        setupDataConnection();
      });
    });
  }

  async function startLocalMedia(){
    if(localStream) return localStream;
    localStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
    document.getElementById('local-video').srcObject = localStream;
    return localStream;
  }

  function connectToPeer(targetId){
    conn = peer.connect(targetId, { reliable:true });
    setupDataConnection();
    conn.on('open', () => {
      conn.send({ type:'name', name: myName });
      const outgoingCall = peer.call(targetId, localStream);
      setupCallEvents(outgoingCall);
    });
  }

  function setupCallEvents(c){
    call = c;
    call.on('stream', (remoteStream) => {
      document.getElementById('remote-video').srcObject = remoteStream;
      document.getElementById('waiting-msg').style.display = 'none';
      enterCallScreen();
      setStatus('on', 'Připojeno' + (remoteName ? ' — ' + remoteName : ''));
    });
    call.on('close', endCallLocal);
    call.on('error', (e) => { console.error(e); });
  }

  function setupDataConnection(){
    conn.on('open', () => {
      conn.send({ type:'name', name: myName });
    });
    conn.on('data', (data) => {
      if(data.type === 'name'){
        remoteName = data.name;
        document.getElementById('remote-name-tag').textContent = remoteName;
        document.getElementById('remote-name-tag').style.display = 'block';
        setStatus('on', 'Připojeno — ' + remoteName);
        addSystemMsg(remoteName + ' se připojil(a).');
      } else if(data.type === 'msg'){
        addMsg(data.text, 'them');
        pulseRing();
        clearTyping();
      } else if(data.type === 'typing'){
        showTyping();
      }
    });
    conn.on('close', () => {
      addSystemMsg('Druhá osoba se odpojila.');
      setStatus('off', 'Odpojeno');
    });
  }

  function enterCallScreen(){
    setupEl.style.display = 'none';
    callEl.style.display = 'flex';
  }

  function pulseRing(){
    const ring = document.getElementById('remote-ring');
    ring.classList.add('active');
    setTimeout(()=>ring.classList.remove('active'), 900);
  }

  // ---------- Chat ----------
  const chatLog = document.getElementById('chat-log');
  const chatInput = document.getElementById('chat-input');

  function addMsg(text, who){
    const div = document.createElement('div');
    div.className = 'msg ' + who;
    div.textContent = text;
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;
    if(who === 'them'){
      const panel = document.getElementById('chat-panel');
      if(panel.classList.contains('hidden') && window.innerWidth > 780){
        document.getElementById('chat-toggle-btn').classList.add('has-unread');
      }
    }
  }
  function addSystemMsg(text){
    const div = document.createElement('div');
    div.className = 'msg sys';
    div.textContent = text;
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function sendMsg(){
    const text = chatInput.value.trim();
    if(!text || !conn || !conn.open) return;
    conn.send({ type:'msg', text });
    addMsg(text, 'me');
    chatInput.value = '';
  }
  document.getElementById('send-btn').addEventListener('click', sendMsg);
  chatInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ sendMsg(); }
    else if(conn && conn.open){ conn.send({ type:'typing' }); }
  });

  function showTyping(){
    document.getElementById('typing-indicator').textContent = (remoteName||'Druhá osoba') + ' píše…';
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(clearTyping, 2000);
  }
  function clearTyping(){
    document.getElementById('typing-indicator').textContent = '';
  }

  // ---------- Controls ----------
  let micOn = true, camOn = true;
  document.getElementById('mic-btn').addEventListener('click', function(){
    if(!localStream) return;
    micOn = !micOn;
    localStream.getAudioTracks().forEach(t => t.enabled = micOn);
    this.classList.toggle('off', !micOn);
    this.textContent = micOn ? '🎤' : '🔇';
  });
  document.getElementById('cam-btn').addEventListener('click', function(){
    if(!localStream) return;
    camOn = !camOn;
    localStream.getVideoTracks().forEach(t => t.enabled = camOn);
    this.classList.toggle('off', !camOn);
    this.textContent = camOn ? '📷' : '🚫';
  });
  document.getElementById('chat-toggle-btn').addEventListener('click', function(){
    const panel = document.getElementById('chat-panel');
    panel.classList.toggle('hidden');
    panel.classList.toggle('open');
    this.classList.remove('has-unread');
  });
  document.getElementById('hangup-btn').addEventListener('click', endCallLocal);

  function endCallLocal(){
    if(call) call.close();
    if(conn) conn.close();
    if(localStream) localStream.getTracks().forEach(t => t.stop());
    if(peer) peer.destroy();
    setStatus('off', 'Hovor ukončen');
    location.reload();
  }

  window.addEventListener('beforeunload', () => {
    if(peer) peer.destroy();
  });
})();
</script>
</body>
</html>
